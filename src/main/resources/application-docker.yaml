spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/queueforge}
    username: ${SPRING_DATASOURCE_USERNAME:queueforge}
    password: ${SPRING_DATASOURCE_PASSWORD:queueforge}
    driver-class-name: org.postgresql.Driver

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.zaxxer.hikari: INFO
    org.hibernate.SQL: INFO

outbox:
  publisher:
    enabled: ${OUTBOX_PUBLISHER_ENABLED:true}
    batch-size: ${OUTBOX_PUBLISHER_BATCH_SIZE:100}
    fixed-delay-ms: ${OUTBOX_PUBLISHER_FIXED_DELAY_MS:5000}
    max-retries: ${OUTBOX_PUBLISHER_MAX_RETRIES:3}
    dispatcher: ${OUTBOX_PUBLISHER_DISPATCHER:kafka}
    topic: ${OUTBOX_PUBLISHER_TOPIC:queueforge.ticket-events}
