spring:
  application:
    name: queueforge
  
  profiles:
    active: dev

server:
  port: 8080

logging:
  charset:
    console: UTF-8
  level:
    com.zaxxer.hikari: DEBUG
    org.hibernate.SQL: debug

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

outbox:
  publisher:
    enabled: false
    batch-size: 100
    fixed-delay-ms: 5000
    max-retries: 3
    dispatcher: logging
    topic: queueforge.ticket-events

queueforge:
  cache:
    branch-board:
      enabled: false
      ttl: 10s
